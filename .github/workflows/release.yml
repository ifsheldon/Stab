name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to receive the binaries
        required: true
        type: string

permissions:
  contents: write

jobs:
  stab:
    name: Build stab (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: macos-aarch64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain

      - name: Build stab
        run: cargo build --release --locked -p stab-cli

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/stab "dist/stab-${{ matrix.name }}"
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "stab-${{ matrix.name }}" > "stab-${{ matrix.name }}.sha256"
          else
            shasum -a 256 "stab-${{ matrix.name }}" > "stab-${{ matrix.name }}.sha256"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
