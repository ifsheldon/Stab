name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        run: cargo install just --locked

      - name: Show toolchain
        run: rustup show active-toolchain

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Oracle version
        run: just oracle::version

      - name: Oracle help smoke
        run: just oracle::run --case smoke/help

      - name: Oracle tiny circuit smoke
        run: just oracle::run --case smoke/tiny-circuit

      - name: Benchmark smoke
        run: just bench::smoke
