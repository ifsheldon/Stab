name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes build-essential cmake

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install just
        run: cargo install just --locked

      - name: Show toolchain
        run: rustup show active-toolchain

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Oracle version
        run: just oracle::version

      - name: Oracle help smoke
        run: just oracle::run --case smoke/help

      - name: Oracle tiny circuit smoke
        run: just oracle::run --case smoke/tiny-circuit

      - name: Benchmark smoke
        run: just bench::smoke
